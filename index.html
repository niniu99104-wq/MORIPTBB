<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>阿霓 | 營收主宰系統</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div id="app">
  <header>
    <h1>阿霓 <span>ANNI</span></h1>
  </header>

  <section id="view-home" class="page active">
    <div class="summary-card">
      <div class="summary-label">本日營收</div>
      <div class="summary-value" id="today-rev">$0</div>
      <div class="summary-grid">
        <div class="grid-item"><span>本日純利</span><b id="today-profit">$0</b></div>
        <div class="grid-item"><span>毛利率</span><b id="today-margin">0%</b></div>
      </div>
    </div>
    <div style="padding: 0 20px;">
      <h3 style="color: var(--text-dim); margin-bottom: 10px;">快速操作</h3>
      <button class="btn btn-save" style="width: 100%; margin-bottom: 15px;" onclick="showModal('sale-modal')">＋ 新增今日交易</button>
      <button class="btn btn-cancel" style="width: 100%;" onclick="switchTab('purchases')">去算國際運費</button>
    </div>
  </section>

  <section id="view-sales" class="page hidden">
    <div style="padding: 0 20px 10px;"><h2>歷史銷售明細</h2></div>
    <div id="sales-list" class="list-container"></div>
  </section>

  <section id="view-purchases" class="page hidden">
    <div style="padding: 0 20px 10px;"><h2>國際運費計算機</h2></div>
    <div class="list-container">
      <div class="card" style="border-color: var(--primary);">
        <p style="font-size: 0.85rem; color: var(--text-dim); margin-bottom: 15px;">輸入整批貨的資訊，系統幫妳算出每件衣服該承擔多少運費。</p>
        <label>該批總國際運費 (台幣)</label>
        <input type="number" id="calc-total-shipping" placeholder="例: 1500">
        <label>該批總件數</label>
        <input type="number" id="calc-total-items" placeholder="例: 50">
        <button class="btn btn-save" style="width: 100%; margin-top: 10px;" onclick="calculateShipping()">計算單件運費</button>
        
        <div id="calc-result" style="margin-top: 15px; text-align: center; font-size: 1.2rem; display: none;">
          單件請加算成本：<span style="color: var(--accent-green); font-weight: bold;" id="calc-result-num">$0</span>
        </div>
      </div>
    </div>
  </section>

  <section id="view-dashboard" class="page hidden">
    <div style="padding: 0 20px 10px;"><h2>全盤營收總覽</h2></div>
    <div class="list-container">
      <div class="card">
        <div class="card-row"><label>總營業額</label><span id="dash-rev">$0</span></div>
        <div class="card-row"><label>總金流手續費</label><span>-$<span id="dash-fee">0</span></span></div>
        <div class="card-profit" style="font-size: 1.2rem;">總淨利 +$<span id="dash-profit">0</span></div>
      </div>
      <div class="card" style="border-color: #2962FF;">
        <h3 style="margin-top:0; font-size: 1rem; color: #2962FF;">經銷分潤應收款</h3>
        <p style="font-size: 0.8rem; color: var(--text-dim);">需匯給廠商的貨款總額：</p>
        <div style="font-size: 1.5rem; font-weight: bold; color: #fff; margin-top: 5px;">$<span id="dash-payable">0</span></div>
      </div>
    </div>
  </section>

  <nav class="nav">
    <div class="nav-item active" onclick="switchTab('home')">首頁</div>
    <div class="nav-item" onclick="switchTab('sales')">銷售明細</div>
    <div class="nav-item" onclick="switchTab('purchases')">採購攤提</div>
    <div class="nav-item" onclick="switchTab('dashboard')">儀表板</div>
  </nav>

  <div class="fab" onclick="showModal('sale-modal')">＋</div>
</div>

<div id="sale-modal" class="modal">
  <div class="modal-content">
    <h3 style="margin-top:0">新增交易</h3>
    
    <label>交易類型</label>
    <select id="type" onchange="toggleFields()">
      <option value="self">自營童裝 (買斷)</option>
      <option value="affiliate">經銷團購 (分潤)</option>
    </select>
    
    <label>訂單總額 (含客收運費)</label>
    <input type="number" id="amount" placeholder="0">

    <div id="self-fields">
      <label>商品原始進價 (單件)</label>
      <input type="number" id="cost" placeholder="0">
      <label>單件國際運費分攤 <span style="color: var(--primary); font-size: 0.75rem;">(去採購頁算)</span></label>
      <input type="number" id="shipping" placeholder="0">
    </div>

    <div id="affiliate-fields" class="hidden">
      <label>廠商分潤比例 (%)</label>
      <input type="number" id="percent" value="15">
    </div>

    <label>客人支付方式 (扣除手續費)</label>
    <select id="payment">
      <option value="cash">現金 / 轉帳 (0%)</option>
      <option value="linepay">LINE Pay (2.2%)</option>
      <option value="credit">信用卡 / 藍新 (2.8%+5)</option>
    </select>

    <div class="btn-group">
      <button class="btn btn-cancel" onclick="closeModal('sale-modal')">取消</button>
      <button class="btn btn-save" onclick="saveTransaction()">確認儲存</button>
    </div>
  </div>
</div>

<script src="app.js"></script>
</body>
</html>
